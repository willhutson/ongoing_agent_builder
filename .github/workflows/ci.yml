name: CI/CD — Test & Deploy

on:
  push:
    branches: [main]
    paths: [modules/**]
  pull_request:
    branches: [main]
    paths: [modules/**]

jobs:
  test:
    name: Test Agent Modules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: modules/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r modules/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: modules
        run: pytest tests/ -v --tb=short

      - name: Verify imports (all modules load cleanly)
        working-directory: modules
        run: python3 scripts/verify_imports.py

  docker-build:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build combined image
        run: docker build -f modules/Dockerfile.combined -t spokestack-test .

      - name: Smoke test — container starts and /health responds
        run: |
          docker run -d --name smoke -p 8000:8000 -e OPENROUTER_API_KEY=test-key spokestack-test
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
          docker logs smoke
          docker stop smoke
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service spokestack --detach
