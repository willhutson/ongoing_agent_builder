name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: spokestack_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/spokestack_test
      OPENROUTER_API_KEY: test-key-not-real
      ERP_API_KEY: test-key
      ERP_CALLBACK_SECRET: test-secret
      REDIS_URL: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verify imports
        run: python -c "from main import app; print('Import OK')"
      - name: Run module tests
        run: |
          cd modules
          pip install -r requirements.txt
          pytest tests/ -v
      - name: Security scan
        run: |
          pip install bandit
          bandit -r src/ -ll --skip B101 || true

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t spokestack-agents .
      - name: Smoke test
        run: |
          docker run -d -p 8000:8000 -e OPENROUTER_API_KEY=test -e PORT=8000 --name test-agents spokestack-agents
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-agents
